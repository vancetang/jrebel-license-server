<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7D3LEW2MC4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7D3LEW2MC4');
    </script>
    <title>激活信息 - JRebel License Server</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.ico">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --border-color: #e9ecef;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent-blue: #0d6efd;
            --accent-green: #198754;
            --shadow-sm: 0 .125rem .25rem rgba(0,0,0,.075);
            --shadow-md: 0 .5rem 1rem rgba(0,0,0,.15);
        }
        
        body {
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        .card {
            background: var(--bg-card);
            border: none;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            max-width: 600px;
            width: 100%;
        }
        
        .result-box {
            background: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', monospace;
            word-break: break-all;
            color: #d63384;
        }
        
        .copy-btn {
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s;
        }
        
        .copy-btn:hover {
            color: var(--accent-blue);
        }
        
        a {
            color: var(--accent-blue);
            text-decoration: none;
        }
        
        a:hover {
            color: #0a58ca;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="card">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h2>🔥 JRebel 激活信息</h2>
                    <p class="text-muted">使用以下信息激活 JRebel</p>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">激活 URL</label>
                    <div class="result-box d-flex justify-content-between align-items-center">
                        <span id="activationUrl"></span>
                        <i class="bi bi-clipboard copy-btn" onclick="copyText(document.getElementById('activationUrl').textContent)" title="复制"></i>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">GUID</label>
                    <div class="result-box d-flex justify-content-between align-items-center">
                        <span id="guidDisplay"></span>
                        <i class="bi bi-clipboard copy-btn" onclick="copyText(document.getElementById('guidDisplay').textContent)" title="复制"></i>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">邮箱</label>
                    <div class="result-box">
                        任意邮箱
                    </div>
                </div>
                
                <div class="alert alert-success">
                    <h6><i class="bi bi-check-circle"></i> 使用方法</h6>
                    <ol class="mb-0">
                        <li>在 JRebel 激活界面选择 <strong>Team URL</strong></li>
                        <li>粘贴上面的激活 URL</li>
                        <li>邮箱填写任意邮箱</li>
                        <li>点击 <strong>Activate</strong></li>
                    </ol>
                </div>
                
                <div class="text-center">
                    <a href="/" class="btn btn-outline-primary">
                        <i class="bi bi-arrow-left"></i> 返回首页
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 从 URL 参数读取 guid 和 base_url
        const params = new URLSearchParams(window.location.search);
        const guid = params.get('guid') || '';
        const baseUrl = params.get('base_url') || 'https://ideabackend.156354.xyz';
        const activationUrl = guid ? `${baseUrl}/${guid}` : baseUrl;

        document.getElementById('activationUrl').textContent = activationUrl;
        document.getElementById('guidDisplay').textContent = guid;

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const icon = event.target;
                icon.classList.remove('bi-clipboard');
                icon.classList.add('bi-check2', 'text-success');
                setTimeout(() => {
                    icon.classList.remove('bi-check2', 'text-success');
                    icon.classList.add('bi-clipboard');
                }, 2000);
            });
        }
    </script>
</body>
</html>
